<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --pv: #e0a020;
            --load: #2bb3c0;
            --bg: transparent;
            --text: #ffffff;
            --textmuted: #9fb0c0;
            --grid: rgba(127, 135, 145, .22);
            --tip-bg: rgba(28, 38, 52, .97);
            --scale: 1;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --text: #1b2430;
                --textmuted: #5c6b7a;
                --grid: rgba(20, 30, 45, .14);
                --tip-bg: rgba(255, 255, 255, .98);
            }
        }

        html { height: 100%; background: var(--bg); overflow: hidden; }
        body { margin: 0; height: 100%; box-sizing: border-box; font-family: var(--font); color: var(--text); }
        .wrap { box-sizing: border-box; padding: 46px 16px 14px; }

        .head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .title { font-size: calc(15px * var(--scale)); font-weight: 500; }
        .legend { display: flex; gap: 14px; flex-wrap: wrap; }
        .lg { font-size: calc(12px * var(--scale)); color: var(--textmuted); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .sw { width: 11px; height: 11px; border-radius: 2px; flex: 0 0 auto; }
        .lg b { color: var(--text); font-weight: 500; }

        .chart { width: 100%; position: relative; }
        .chart svg { display: block; width: 100%; height: auto; cursor: crosshair; }
        .empty { color: var(--textmuted); font-size: calc(13px * var(--scale)); padding: 24px 4px; }

        .tip {
            position: absolute; pointer-events: none; display: none;
            background: var(--tip-bg); border: 1px solid var(--grid);
            border-radius: 6px; padding: 6px 9px; font-size: calc(11px * var(--scale));
            line-height: 1.5; color: var(--text); white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .18); z-index: 5;
        }
        .tip-h { color: var(--textmuted); margin-bottom: 2px; }
        .tip b { font-weight: 500; }

        text { font-family: var(--font); }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="head">
            <div class="title">Energiebilanz</div>
            <div class="legend" id="legend"></div>
        </div>
        <div class="chart" id="chart"></div>
    </div>

    <script>
        var lastData = null, G = null, tipEl = null, hoverBound = false;
        var userHide = { pv: false, load: false };

        function toggleSeries(which) { userHide[which] = !userHide[which]; render(); }

        function handleMessage(payload) {
            var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
            if (!data) { return; }
            lastData = data;
            var root = document.documentElement.style;
            if (data.pvColor) { root.setProperty('--pv', data.pvColor); }
            if (data.loadColor) { root.setProperty('--load', data.loadColor); }
            root.setProperty('--bg', data.bg ? data.bg : 'transparent');
            root.setProperty('--scale', data.scale || 1);
            render();
        }

        function fmt(v, d) { return (Math.round(v * Math.pow(10, d)) / Math.pow(10, d)).toFixed(d); }
        function pad(x) { return (x < 10 ? '0' : '') + x; }
        function toKW(arr) { return arr.map(function (v) { return v / 1000; }); }

        function render() {
            var data = lastData;
            var chart = document.getElementById('chart');
            var legend = document.getElementById('legend');
            legend.innerHTML = '';
            G = null;

            if (!data || !data.hasData || !data.days || !data.days.length) {
                chart.innerHTML = '<div class="empty">' + ((data && data.message) || 'Keine Daten') + '</div>';
                return;
            }

            var opt = {
                lw: data.lineWidth || 2,
                smooth: data.smooth !== false,
                showBand: data.showBand !== false,
                bandOp: (data.bandOp != null ? data.bandOp : 0.16),
                showGrid: data.showGrid !== false,
                yMaxManual: data.yMaxManual || 0
            };

            // kW-Reihen je Tag aufbereiten (inkl. kWh je Tag)
            var nDays = data.days.length;
            var gdays = [];
            var pvAny = false, loadAny = false;
            data.days.forEach(function (d) {
                var pv = d.pv ? { p10: toKW(d.pv.p10), p50: toKW(d.pv.p50), p90: toKW(d.pv.p90), kwh: d.pv.kwh } : null;
                var ld = d.load ? { p10: toKW(d.load.p10), p50: toKW(d.load.p50), p90: toKW(d.load.p90), kwh: d.load.kwh } : null;
                if (d.pv) { pvAny = true; }
                if (d.load) { loadAny = true; }
                gdays.push({ label: d.label, pv: pv, load: ld });
            });

            // Legende = klickbarer Farbschlüssel (im WebFront aus-/einblenden)
            // + (falls vorhanden) momentaner Ist-Wert. Ausgeblendete Reihe wird gedimmt.
            if (pvAny) {
                var lpv = 'PV';
                if (data.actualPV != null) { lpv += ' · jetzt <b>' + fmt(data.actualPV / 1000, 2) + ' kW</b>'; }
                var opv = userHide.pv ? 0.4 : 1;
                legend.innerHTML += '<span class="lg" onclick="toggleSeries(\'pv\')" title="Klick: aus-/einblenden" style="cursor:pointer;opacity:' + opv + '"><span class="sw" style="background:var(--pv)"></span>' + lpv + '</span>';
            }
            if (loadAny) {
                var lld = 'Verbrauch';
                if (data.actualLoad != null) { lld += ' · jetzt <b>' + fmt(data.actualLoad / 1000, 2) + ' kW</b>'; }
                var old = userHide.load ? 0.4 : 1;
                legend.innerHTML += '<span class="lg" onclick="toggleSeries(\'load\')" title="Klick: aus-/einblenden" style="cursor:pointer;opacity:' + old + '"><span class="sw" style="background:var(--load)"></span>' + lld + '</span>';
            }

            // Laufzeit-Sichtbarkeit (Klick im WebFront)
            var visPV = pvAny && !userHide.pv;
            var visLoad = loadAny && !userHide.load;

            // gemeinsames yMax (nur sichtbare Reihen, oder manuell vorgegeben)
            var max = 0;
            gdays.forEach(function (g) {
                [visPV ? g.pv : null, visLoad ? g.load : null].forEach(function (s) {
                    if (s) { s.p90.forEach(function (v) { if (v > max) { max = v; } }); }
                });
            });
            var yMax = opt.yMaxManual > 0 ? opt.yMaxManual : Math.max(0.5, Math.ceil(max * 1.15 * 2) / 2);

            var W = 700, H = 248, mL = 34, mR = 8, mT = 10, mB = 40;
            var pw = W - mL - mR, ph = H - mT - mB;
            var dayW = pw / nDays;
            var y = function (v) { return mT + ph * (1 - v / yMax); };
            var xs = function (d, i, m) { return mL + d * dayW + (m > 1 ? (i / (m - 1)) : 0.5) * dayW; };

            var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Energieprognose: PV-Erzeugung und Verbrauch">';

            // Y-Gitter (optional)
            if (opt.showGrid) {
                [0, yMax / 2, yMax].forEach(function (v) {
                    var yy = y(v);
                    svg += '<line x1="' + mL + '" y1="' + fmt(yy, 1) + '" x2="' + (W - mR) + '" y2="' + fmt(yy, 1) + '" stroke="var(--grid)" stroke-width="1"/>';
                    svg += '<text x="' + (mL - 5) + '" y="' + fmt(yy + 3, 1) + '" text-anchor="end" font-size="10" fill="var(--textmuted)">' + fmt(v, 1) + '</text>';
                });
                svg += '<text x="2" y="' + (mT + 6) + '" font-size="9" fill="var(--textmuted)">kW</text>';
            }

            // Tagestrenner + Tagesname + kWh je Tag
            for (var d = 0; d < nDays; d++) {
                if (d > 0) {
                    var xb = mL + d * dayW;
                    svg += '<line x1="' + fmt(xb, 1) + '" y1="' + mT + '" x2="' + fmt(xb, 1) + '" y2="' + (mT + ph) + '" stroke="var(--grid)" stroke-width="1"/>';
                }
                var kx = mL + (d + 0.5) * dayW;
                svg += '<text x="' + fmt(kx, 1) + '" y="' + (H - 24) + '" text-anchor="middle" font-size="11" fill="var(--textmuted)">' + gdays[d].label + '</text>';
                var pvd = visPV ? gdays[d].pv : null;
                var ldd = visLoad ? gdays[d].load : null;
                var parts = '';
                if (pvd) { parts += '<tspan fill="var(--pv)">' + fmt(pvd.kwh, 2) + '</tspan>'; }
                if (pvd && ldd) { parts += '<tspan fill="var(--textmuted)"> · </tspan>'; }
                if (ldd) { parts += '<tspan fill="var(--load)">' + fmt(ldd.kwh, 2) + '</tspan>'; }
                if (parts) { parts += '<tspan fill="var(--textmuted)"> kWh</tspan>'; }
                svg += '<text x="' + fmt(kx, 1) + '" y="' + (H - 9) + '" text-anchor="middle" font-size="10">' + parts + '</text>';
            }

            // Pfad aus Punkten [[x,y],…] — optional Catmull-Rom-Glättung.
            function cmds(pts) {
                if (pts.length < 2) { return ''; }
                if (!opt.smooth) {
                    var s = '';
                    for (var i = 1; i < pts.length; i++) { s += ' L ' + fmt(pts[i][0], 1) + ',' + fmt(pts[i][1], 1); }
                    return s;
                }
                var out = '';
                for (var i = 0; i < pts.length - 1; i++) {
                    var p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || pts[i + 1];
                    var c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
                    var c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
                    out += ' C ' + fmt(c1x, 1) + ',' + fmt(c1y, 1) + ' ' + fmt(c2x, 1) + ',' + fmt(c2y, 1) + ' ' + fmt(p2[0], 1) + ',' + fmt(p2[1], 1);
                }
                return out;
            }

            // Reihe zeichnen (Band optional + Median-Linie)
            function series(d, s, colorVar) {
                if (!s) { return ''; }
                var m = s.p50.length;
                if (m < 2) { return ''; }
                var top = [], bot = [], mid = [];
                for (var i = 0; i < m; i++) {
                    var x = xs(d, i, m);
                    top.push([x, y(s.p90[i])]);
                    mid.push([x, y(s.p50[i])]);
                }
                for (var i = m - 1; i >= 0; i--) { bot.push([xs(d, i, m), y(s.p10[i])]); }

                var out = '';
                if (opt.showBand && opt.bandOp > 0) {
                    var band = 'M ' + fmt(top[0][0], 1) + ',' + fmt(top[0][1], 1) + cmds(top)
                             + ' L ' + fmt(bot[0][0], 1) + ',' + fmt(bot[0][1], 1) + cmds(bot) + ' Z';
                    out += '<path d="' + band + '" fill="' + colorVar + '" fill-opacity="' + opt.bandOp + '" stroke="none"/>';
                }
                var line = 'M ' + fmt(mid[0][0], 1) + ',' + fmt(mid[0][1], 1) + cmds(mid);
                out += '<path d="' + line + '" fill="none" stroke="' + colorVar + '" stroke-width="' + opt.lw + '" stroke-linejoin="round" stroke-linecap="round"/>';
                return out;
            }
            for (var d = 0; d < nDays; d++) {
                svg += series(d, visPV ? gdays[d].pv : null, 'var(--pv)');
                svg += series(d, visLoad ? gdays[d].load : null, 'var(--load)');
            }

            // Gemessener Tagesverlauf (heute) als gestrichelte Overlay-Linie
            function overlay(arr, colorVar) {
                if (!arr) { return ''; }
                var m = arr.length, pts = [];
                for (var i = 0; i < m; i++) { if (arr[i] != null) { pts.push([xs(0, i, m), y(arr[i] / 1000)]); } }
                if (pts.length < 2) { return ''; }
                return '<path d="M ' + fmt(pts[0][0], 1) + ',' + fmt(pts[0][1], 1) + cmds(pts)
                     + '" fill="none" stroke="' + colorVar + '" stroke-width="' + Math.max(1, opt.lw - 0.5)
                     + '" stroke-dasharray="2 3" stroke-linecap="round" stroke-linejoin="round"/>';
            }
            if (visPV) { svg += overlay(data.measuredPV, 'var(--pv)'); }
            if (visLoad) { svg += overlay(data.measuredLoad, 'var(--load)'); }

            // „jetzt"-Marker (Tag 0 = heute) + Ist-Werte als Punkt auf der Linie
            if (gdays[0].label === 'heute') {
                var ref = (visPV ? gdays[0].pv : null) || (visLoad ? gdays[0].load : null);
                if (ref) {
                    var m0 = ref.p50.length;
                    var now = new Date();
                    var idxNow = Math.floor((now.getHours() * 60 + now.getMinutes()) / (1440 / m0));
                    if (idxNow >= 0 && idxNow < m0) {
                        var xn = xs(0, idxNow, m0);
                        svg += '<line x1="' + fmt(xn, 1) + '" y1="' + mT + '" x2="' + fmt(xn, 1) + '" y2="' + (mT + ph) + '" stroke="var(--textmuted)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>';
                        var actDot = function (valW, colorVar) {
                            if (valW == null) { return; }
                            var yy = Math.max(mT, Math.min(mT + ph, y(valW / 1000)));
                            svg += '<circle cx="' + fmt(xn, 1) + '" cy="' + fmt(yy, 1) + '" r="4.5" fill="' + colorVar + '" stroke="var(--tip-bg)" stroke-width="1.5"/>';
                        };
                        if (visPV && gdays[0].pv) { actDot(data.actualPV, 'var(--pv)'); }
                        if (visLoad && gdays[0].load) { actDot(data.actualLoad, 'var(--load)'); }
                    }
                }
            }

            // Hover-Gruppe
            svg += '<g id="hv" style="display:none">';
            svg += '<line id="hvline" y1="' + mT + '" y2="' + (mT + ph) + '" stroke="var(--textmuted)" stroke-width="1" opacity="0.7"/>';
            svg += '<circle id="hvpv" r="3.5" fill="var(--pv)" style="display:none"/>';
            svg += '<circle id="hvload" r="3.5" fill="var(--load)" style="display:none"/>';
            svg += '</g>';

            svg += '</svg>';
            chart.innerHTML = svg;

            G = { W: W, mL: mL, mT: mT, ph: ph, dayW: dayW, nDays: nDays, yMax: yMax,
                  y: y, xs: xs, days: gdays, pvVisible: visPV, loadVisible: visLoad,
                  hv: chart.querySelector('#hv'), hvline: chart.querySelector('#hvline'),
                  hvpv: chart.querySelector('#hvpv'), hvload: chart.querySelector('#hvload') };
            ensureTip();
            bindHover();
        }

        function ensureTip() {
            var chart = document.getElementById('chart');
            if (!tipEl) { tipEl = document.createElement('div'); tipEl.className = 'tip'; }
            if (tipEl.parentNode !== chart) { chart.appendChild(tipEl); }
        }

        function hideHover() {
            if (G && G.hv) { G.hv.style.display = 'none'; }
            if (tipEl) { tipEl.style.display = 'none'; }
        }

        function showHover(clientX, clientY) {
            if (!G) { return; }
            var chart = document.getElementById('chart');
            var svgEl = chart.querySelector('svg');
            if (!svgEl) { return; }
            var r = svgEl.getBoundingClientRect();
            if (r.width <= 0) { return; }

            var vbX = (clientX - r.left) / r.width * G.W;
            var d = Math.floor((vbX - G.mL) / G.dayW);
            d = Math.max(0, Math.min(G.nDays - 1, d));
            var frac = ((vbX - G.mL) - d * G.dayW) / G.dayW;
            frac = Math.max(0, Math.min(1, frac));

            var day = G.days[d];
            var dpv = G.pvVisible ? day.pv : null;
            var dload = G.loadVisible ? day.load : null;
            var ref = dpv || dload;
            if (!ref) { return; }
            var mRef = ref.p50.length;
            var slotIdx = Math.round(frac * (mRef - 1));
            var tMin = Math.round(slotIdx * (1440 / mRef));
            var hx = G.xs(d, slotIdx, mRef);

            G.hvline.setAttribute('x1', hx); G.hvline.setAttribute('x2', hx);

            var rows = '';
            function place(circle, s, colorName, name) {
                if (!s) { circle.style.display = 'none'; return null; }
                var m = s.p50.length;
                var idx = Math.round(frac * (m - 1));
                var v = s.p50[idx];
                circle.setAttribute('cx', G.xs(d, idx, m));
                circle.setAttribute('cy', G.y(v));
                circle.style.display = '';
                rows += '<div><b style="color:' + colorName + '">' + fmt(v, 2) + ' kW</b> ' + name + '</div>';
                return v;
            }
            var pvV = place(G.hvpv, dpv, 'var(--pv)', 'PV');
            var loadV = place(G.hvload, dload, 'var(--load)', 'Verbrauch');
            G.hv.style.display = '';

            var label = day.label.charAt(0).toUpperCase() + day.label.slice(1);
            var hh = pad(Math.floor(tMin / 60)) + ':' + pad(tMin % 60);
            var net = '';
            if (pvV !== null && loadV !== null) {
                var saldo = pvV - loadV;
                net = '<div class="tip-h" style="margin-top:2px">Saldo ' + (saldo >= 0 ? '+' : '') + fmt(saldo, 2) + ' kW</div>';
            }
            tipEl.innerHTML = '<div class="tip-h">' + label + ' ' + hh + '</div>' + rows + net;
            tipEl.style.display = 'block';

            var cr = chart.getBoundingClientRect();
            var px = clientX - cr.left, py = clientY - cr.top;
            var tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
            var left = px + 14; if (left + tw > cr.width) { left = px - 14 - tw; } if (left < 0) { left = 2; }
            var top = py - th - 10; if (top < 0) { top = py + 16; }
            tipEl.style.left = left + 'px';
            tipEl.style.top = top + 'px';
        }

        function bindHover() {
            if (hoverBound) { return; }
            hoverBound = true;
            var chart = document.getElementById('chart');
            chart.addEventListener('mousemove', function (e) { showHover(e.clientX, e.clientY); });
            chart.addEventListener('mouseleave', hideHover);
            chart.addEventListener('touchstart', function (e) { var t = e.touches[0]; if (t) { showHover(t.clientX, t.clientY); } });
            chart.addEventListener('touchmove', function (e) { var t = e.touches[0]; if (t) { showHover(t.clientX, t.clientY); } });
            chart.addEventListener('touchend', hideHover);
        }

        window.addEventListener('resize', render);
    </script>
</body>

</html>
