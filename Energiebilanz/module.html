<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        html, body { margin: 0; height: 100%; background: transparent; }
        .wrap { box-sizing: border-box; padding: 42px 6px 6px; }
        #chart { width: 100%; height: 300px; }
        .empty { color: #8a97a3; font-size: 13px; padding: 24px 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
</head>

<body>
    <div class="wrap">
        <div id="chart"></div>
    </div>

    <script>
        var lastData = null, chart = null;

        function handleMessage(payload) {
            var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
            if (!data) { return; }
            lastData = data;
            build();
        }

        function pad(x) { return (x < 10 ? '0' : '') + x; }
        function kw(w) { return (w / 1000).toFixed(2); }
        function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

        function build() {
            if (typeof Highcharts === 'undefined' || typeof Highcharts.seriesTypes.arearange === 'undefined') {
                setTimeout(build, 80); return;
            }
            var data = lastData;
            var el = document.getElementById('chart');
            if (!data || !data.hasData || !data.days || !data.days.length) {
                if (chart) { chart.destroy(); chart = null; }
                el.innerHTML = '<div class="empty">' + ((data && data.message) || 'Keine Daten') + '</div>';
                return;
            }

            var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var TEXT = dark ? '#e8edf2' : '#1b2430';
            var MUTED = dark ? '#9fb0c0' : '#5c6b7a';
            var GRID = dark ? 'rgba(127,135,145,.22)' : 'rgba(20,30,45,.14)';
            var TIP = dark ? 'rgba(28,38,52,.97)' : 'rgba(255,255,255,.98)';

            var days = data.days, nDays = days.length;
            var pvC = data.pvColor || '#e0a020', loC = data.loadColor || '#2bb3c0';
            var scale = data.scale || 1, lw = data.lineWidth || 2;
            var stype = (data.smooth !== false) ? 'spline' : 'line';
            var showBand = data.showBand !== false, bandOp = (data.bandOp != null ? data.bandOp : 0.16);
            var fpx = function (n) { return (n * scale) + 'px'; };

            var pvPresent = false, loPresent = false;
            var pvLine = [], pvBand = [], loLine = [], loBand = [];
            days.forEach(function (d, di) {
                if (d.pv) {
                    pvPresent = true;
                    var n = d.pv.p50.length, st = 24 / n;
                    for (var i = 0; i < n; i++) {
                        var x = di * 24 + i * st;
                        pvLine.push([x, d.pv.p50[i] / 1000]);
                        pvBand.push([x, d.pv.p10[i] / 1000, d.pv.p90[i] / 1000]);
                    }
                }
                if (d.load) {
                    loPresent = true;
                    var n2 = d.load.p50.length, st2 = 24 / n2;
                    for (var j = 0; j < n2; j++) {
                        var x2 = di * 24 + j * st2;
                        loLine.push([x2, d.load.p50[j] / 1000]);
                        loBand.push([x2, d.load.p10[j] / 1000, d.load.p90[j] / 1000]);
                    }
                }
            });

            function measured(arr, day0) {
                if (!arr || !day0) { return []; }
                var n = day0.p50.length, st = 24 / n, out = [];
                for (var i = 0; i < n; i++) { if (arr[i] != null) { out.push([i * st, arr[i] / 1000]); } }
                return out;
            }
            var pvMeas = measured(data.measuredPV, days[0].pv);
            var loMeas = measured(data.measuredLoad, days[0].load);

            // „jetzt"-Punkte + Marker
            var nowX = null, nowPts = [];
            if (days[0].label === 'heute') {
                var now = new Date();
                nowX = now.getHours() + now.getMinutes() / 60;
                if (pvPresent && data.actualPV != null) { nowPts.push({ x: nowX, y: data.actualPV / 1000, color: pvC }); }
                if (loPresent && data.actualLoad != null) { nowPts.push({ x: nowX, y: data.actualLoad / 1000, color: loC }); }
            }

            var series = [];
            if (pvPresent) {
                series.push({ id: 'pv', type: stype, name: 'PV', data: pvLine, color: pvC, lineWidth: lw, zIndex: 3 });
                if (showBand && bandOp > 0) { series.push({ type: 'arearange', name: 'PV-Band', data: pvBand, color: pvC, fillOpacity: bandOp, lineWidth: 0, linkedTo: 'pv', enableMouseTracking: false, showInLegend: false, zIndex: 1 }); }
                if (pvMeas.length > 1) { series.push({ type: stype, name: 'PV gemessen', data: pvMeas, color: pvC, dashStyle: 'ShortDash', lineWidth: Math.max(1, lw - 0.5), linkedTo: 'pv', enableMouseTracking: false, showInLegend: false, zIndex: 3 }); }
            }
            if (loPresent) {
                series.push({ id: 'load', type: stype, name: 'Verbrauch', data: loLine, color: loC, lineWidth: lw, zIndex: 3 });
                if (showBand && bandOp > 0) { series.push({ type: 'arearange', name: 'Verbrauch-Band', data: loBand, color: loC, fillOpacity: bandOp, lineWidth: 0, linkedTo: 'load', enableMouseTracking: false, showInLegend: false, zIndex: 1 }); }
                if (loMeas.length > 1) { series.push({ type: stype, name: 'Verbrauch gemessen', data: loMeas, color: loC, dashStyle: 'ShortDash', lineWidth: Math.max(1, lw - 0.5), linkedTo: 'load', enableMouseTracking: false, showInLegend: false, zIndex: 3 }); }
            }
            if (nowPts.length) { series.push({ type: 'scatter', name: 'jetzt', data: nowPts, showInLegend: false, enableMouseTracking: false, zIndex: 6, marker: { enabled: true, radius: 5, symbol: 'circle', lineColor: TIP, lineWidth: 2 } }); }

            var plotLines = [];
            for (var di = 1; di < nDays; di++) { plotLines.push({ value: di * 24, color: GRID, width: 1, zIndex: 2 }); }
            if (nowX != null) { plotLines.push({ value: nowX, color: MUTED, width: 1, dashStyle: 'Dash', zIndex: 4 }); }

            var ticks = [];
            for (var t = 0; t < nDays; t++) { ticks.push(t * 24 + 12); }

            var options = {
                chart: { backgroundColor: data.bg ? data.bg : 'transparent', height: 300, spacing: [6, 8, 2, 6], style: { fontFamily: data.font || 'sans-serif' }, animation: false },
                title: { text: undefined }, credits: { enabled: false }, exporting: { enabled: false },
                legend: { enabled: true, align: 'right', verticalAlign: 'top', floating: true, x: -4, y: -8, useHTML: true, symbolRadius: 6, itemStyle: { color: TEXT, fontSize: fpx(11), fontWeight: '400' }, itemHoverStyle: { color: TEXT }, labelFormatter: function () {
                    var ex = '';
                    if (this.userOptions.id === 'pv' && data.actualPV != null) { ex = ' · jetzt <b>' + kw(data.actualPV) + ' kW</b>'; }
                    if (this.userOptions.id === 'load' && data.actualLoad != null) { ex = ' · jetzt <b>' + kw(data.actualLoad) + ' kW</b>'; }
                    return this.name + ex;
                } },
                xAxis: {
                    min: 0, max: nDays * 24, tickPositions: ticks, gridLineWidth: 0,
                    lineColor: GRID, tickLength: 0, plotLines: plotLines,
                    labels: {
                        useHTML: true, y: 26, style: { fontSize: fpx(10) },
                        formatter: function () {
                            var di = Math.round((this.value - 12) / 24);
                            if (di < 0 || di >= nDays) { return ''; }
                            var d = days[di], k = '';
                            if (d.pv) { k += '<span style="color:' + pvC + '">' + d.pv.kwh.toFixed(2) + '</span>'; }
                            if (d.pv && d.load) { k += ' · '; }
                            if (d.load) { k += '<span style="color:' + loC + '">' + d.load.kwh.toFixed(2) + '</span>'; }
                            if (k) { k += ' kWh'; }
                            return '<div style="text-align:center;line-height:1.25"><div style="font-weight:500;color:' + TEXT + '">' + cap(d.label) + '</div><div style="color:' + MUTED + ';font-size:0.88em">' + k + '</div></div>';
                        }
                    }
                },
                yAxis: {
                    min: 0, max: (data.yMaxManual > 0 ? data.yMaxManual : null),
                    title: { text: 'kW', style: { color: MUTED, fontSize: fpx(10) } },
                    gridLineColor: GRID, gridLineWidth: (data.showGrid !== false) ? 1 : 0,
                    labels: { style: { color: MUTED, fontSize: fpx(10) } }
                },
                tooltip: {
                    shared: true, useHTML: true, backgroundColor: TIP, borderColor: GRID, borderRadius: 6,
                    style: { color: TEXT, fontSize: fpx(11) },
                    formatter: function () {
                        var x = this.x, di = Math.floor(x / 24 + 1e-6), hod = x - di * 24;
                        var hh = Math.floor(hod + 1e-6), mm = Math.round((hod - hh) * 60);
                        if (mm >= 60) { hh++; mm -= 60; }
                        var head = cap((days[di] || days[0]).label) + ' ' + pad(hh) + ':' + pad(mm);
                        var html = '<div style="font-weight:500;margin-bottom:2px">' + head + '</div>';
                        var pvV = null, loV = null;
                        this.points.forEach(function (p) {
                            if (p.series.userOptions.id === 'pv') { pvV = p.y; html += '<div><span style="color:' + pvC + '">●</span> PV: <b>' + p.y.toFixed(2) + ' kW</b></div>'; }
                            if (p.series.userOptions.id === 'load') { loV = p.y; html += '<div><span style="color:' + loC + '">●</span> Verbrauch: <b>' + p.y.toFixed(2) + ' kW</b></div>'; }
                        });
                        if (pvV != null && loV != null) { var s = pvV - loV; html += '<div style="color:' + MUTED + ';margin-top:2px">Saldo ' + (s >= 0 ? '+' : '') + s.toFixed(2) + ' kW</div>'; }
                        return html;
                    }
                },
                plotOptions: { series: { animation: false, marker: { enabled: false }, states: { inactive: { opacity: 1 } } } },
                series: series
            };

            if (chart) {
                try { chart.update(options, true, true); }
                catch (e) { try { chart.destroy(); } catch (_) {} chart = null; }
            }
            if (!chart) { el.innerHTML = ''; chart = Highcharts.chart('chart', options); }
        }

        window.addEventListener('resize', function () { if (chart) { chart.reflow(); } });
    </script>
</body>

</html>
